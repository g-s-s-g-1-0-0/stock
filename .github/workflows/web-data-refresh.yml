name: Web data refresh

on:
  schedule:
    # Backup technical refresh every 2 hours, 5 minutes before KST even hours.
    # The job waits until the exact hour before sending notifications and publishing caches.
    # External cron-job.org dispatches remain the primary scheduler.
    - cron: "55 0-22/2 * * *"
  workflow_dispatch:
    inputs:
      refresh_scope:
        description: "Refresh scope"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - analysis
          - valuation
          - technical
          - market-trends
          - market-events
      send_notifications:
        description: "Send notification emails"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: web-data-refresh-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MARKET_TREND_MODEL: ${{ secrets.GROQ_MARKET_TREND_MODEL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MAX_REFRESH_UNIVERSE: "200"
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
      NOTIFICATION_UNSUBSCRIBE_SECRET: ${{ secrets.NOTIFICATION_UNSUBSCRIBE_SECRET }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync branch with latest remote
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          git fetch origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Snapshot previous web caches
        run: |
          cp web/public/api/stocks.json "$RUNNER_TEMP/stocks.before-refresh.json" 2>/dev/null || echo '{"rows":[]}' > "$RUNNER_TEMP/stocks.before-refresh.json"
          cp web/public/api/trade-logs.json "$RUNNER_TEMP/trade-logs.before-refresh.json" 2>/dev/null || echo '{"rows":[]}' > "$RUNNER_TEMP/trade-logs.before-refresh.json"

      - name: Resolve refresh tasks
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TASKS="technical"
            SEND_NOTIFICATIONS="true"
            PUBLISH_AT="$(python -c 'from datetime import datetime, timedelta, timezone; now = datetime.now(timezone.utc); publish_at = now.replace(minute=0, second=0, microsecond=0); publish_at = publish_at + timedelta(hours=1) if publish_at <= now else publish_at; print(publish_at.isoformat(timespec="seconds").replace("+00:00", "Z"))')"
          else
            case "${{ inputs.refresh_scope }}" in
              all) TASKS="valuation technical market-trends market-events" ;;
              analysis) TASKS="valuation technical" ;;
              valuation) TASKS="valuation" ;;
              technical) TASKS="technical" ;;
              market-trends) TASKS="market-trends" ;;
              market-events) TASKS="market-events" ;;
              *) TASKS="valuation technical market-trends market-events" ;;
            esac
            SEND_NOTIFICATIONS="${{ inputs.send_notifications || 'true' }}"
            PUBLISH_AT=""
          fi
          echo "REFRESH_TASKS=$TASKS" >> "$GITHUB_ENV"
          echo "SEND_NOTIFICATIONS=$SEND_NOTIFICATIONS" >> "$GITHUB_ENV"
          echo "WEB_REFRESH_PUBLISH_AT=$PUBLISH_AT" >> "$GITHUB_ENV"
          echo "Resolved refresh tasks: $TASKS"
          echo "Send notifications: $SEND_NOTIFICATIONS"
          echo "Publish at: ${PUBLISH_AT:-immediate}"

      - name: Skip fresh scheduled refresh
        if: ${{ github.event_name == 'schedule' }}
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path("web/public/api/technical.json")
          skip = False
          if path.exists():
              payload = json.loads(path.read_text(encoding="utf-8"))
              meta = payload.get("meta", {}) if isinstance(payload, dict) else {}
              raw_updated_at = meta.get("lastSuccessfulRun") or meta.get("updatedAt")
              if raw_updated_at:
                  updated_at = datetime.fromisoformat(str(raw_updated_at).replace("Z", "+00:00"))
                  age_seconds = (datetime.now(timezone.utc) - updated_at.astimezone(timezone.utc)).total_seconds()
                  skip = age_seconds < 90 * 60
                  print(f"Technical cache age: {age_seconds:.0f}s")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"SKIP_REFRESH={'true' if skip else 'false'}\n")
          print("Scheduled refresh skipped because cache is fresh." if skip else "Scheduled refresh will run.")
          PY

      - name: Refresh web caches
        if: ${{ env.SKIP_REFRESH != 'true' }}
        run: python scripts/refresh_web_caches.py $REFRESH_TASKS

      - name: Record stock-level operation logs
        if: ${{ env.SKIP_REFRESH != 'true' }}
        continue-on-error: true
        env:
          PREVIOUS_STOCKS_PATH: ${{ runner.temp }}/stocks.before-refresh.json
        run: python scripts/record_web_api_logs.py $REFRESH_TASKS

      - name: Report operational scale metrics
        if: ${{ env.SKIP_REFRESH != 'true' }}
        continue-on-error: true
        run: python scripts/report_operational_scale.py

      - name: Wait until scheduled publish time
        if: ${{ env.SKIP_REFRESH != 'true' && env.WEB_REFRESH_PUBLISH_AT != '' }}
        run: |
          python - <<'PY'
          import os
          import time
          from datetime import datetime, timezone

          raw_publish_at = os.environ.get("WEB_REFRESH_PUBLISH_AT", "")
          publish_at = datetime.fromisoformat(raw_publish_at.replace("Z", "+00:00")).astimezone(timezone.utc)
          wait_seconds = max(0, int((publish_at - datetime.now(timezone.utc)).total_seconds()))
          print(f"Waiting {wait_seconds}s until scheduled publish time: {raw_publish_at}")
          if wait_seconds:
              time.sleep(wait_seconds)
          PY

      - name: Send opinion change emails
        if: ${{ env.SKIP_REFRESH != 'true' && env.SEND_NOTIFICATIONS == 'true' && contains(env.REFRESH_TASKS, 'technical') }}
        run: python scripts/web_refresh_notifications.py opinion --previous "$RUNNER_TEMP/stocks.before-refresh.json" --previous-trade-logs "$RUNNER_TEMP/trade-logs.before-refresh.json"

      - name: Send trade exit emails
        if: ${{ env.SKIP_REFRESH != 'true' && env.SEND_NOTIFICATIONS == 'true' && contains(env.REFRESH_TASKS, 'technical') }}
        run: python scripts/web_refresh_notifications.py trade-exit --previous "$RUNNER_TEMP/trade-logs.before-refresh.json"

      - name: Send Nasdaq peak emails
        if: ${{ env.SKIP_REFRESH != 'true' && env.SEND_NOTIFICATIONS == 'true' && contains(env.REFRESH_TASKS, 'technical') }}
        run: python scripts/web_refresh_notifications.py nasdaq-peak

      - name: Send earnings D-1 emails
        if: ${{ env.SKIP_REFRESH != 'true' && env.SEND_NOTIFICATIONS == 'true' && contains(env.REFRESH_TASKS, 'valuation') }}
        run: python scripts/web_refresh_notifications.py earnings

      - name: Send weekly trend report emails
        if: ${{ env.SKIP_REFRESH != 'true' && env.SEND_NOTIFICATIONS == 'true' && contains(env.REFRESH_TASKS, 'market-trends') }}
        run: python scripts/web_refresh_notifications.py weekly-trend

      - name: Commit refreshed caches and notification state
        if: ${{ env.SKIP_REFRESH != 'true' }}
        run: |
          if git diff --quiet -- data/cache web/public/api; then
            echo "No cache changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache web/public/api
          git commit -m "Update scheduled web data caches"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"

      - name: Deploy refreshed web
        if: ${{ env.SKIP_REFRESH != 'true' && env.VERCEL_TOKEN != '' }}
        working-directory: web
        run: npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Notify admins on failure
        if: failure()
        continue-on-error: true
        run: python scripts/web_refresh_notifications.py admin-failure --message "Web data refresh workflow failed. Check the latest GitHub Actions run."
