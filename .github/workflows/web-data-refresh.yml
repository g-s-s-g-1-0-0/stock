name: Web data refresh

on:
  workflow_dispatch:
    inputs:
      refresh_scope:
        description: "Refresh scope"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - valuation
          - technical
          - market-trends
          - market-events

permissions:
  contents: write

concurrency:
  group: web-data-refresh-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      MAX_REFRESH_UNIVERSE: "200"
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync branch with latest remote
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          git fetch origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Snapshot previous stocks cache
        run: |
          mkdir -p data/cache
          cp web/public/api/stocks.json data/cache/stocks.before-refresh.json 2>/dev/null || echo '{"rows":[]}' > data/cache/stocks.before-refresh.json

      - name: Resolve refresh tasks
        run: |
          case "${{ inputs.refresh_scope }}" in
            all) TASKS="valuation technical market-trends market-events" ;;
            valuation) TASKS="valuation" ;;
            technical) TASKS="technical" ;;
            market-trends) TASKS="market-trends" ;;
            market-events) TASKS="market-events" ;;
            *) TASKS="valuation technical market-trends market-events" ;;
          esac
          echo "REFRESH_TASKS=$TASKS" >> "$GITHUB_ENV"
          echo "Resolved refresh tasks: $TASKS"

      - name: Refresh web caches
        run: python scripts/refresh_web_caches.py $REFRESH_TASKS

      - name: Send opinion change emails
        if: ${{ contains(env.REFRESH_TASKS, 'technical') }}
        run: python scripts/web_refresh_notifications.py opinion

      - name: Send Nasdaq peak emails
        if: ${{ contains(env.REFRESH_TASKS, 'technical') }}
        run: python scripts/web_refresh_notifications.py nasdaq-peak

      - name: Send earnings D-1 emails
        if: ${{ contains(env.REFRESH_TASKS, 'valuation') }}
        run: python scripts/web_refresh_notifications.py earnings

      - name: Send weekly trend report emails
        if: ${{ contains(env.REFRESH_TASKS, 'market-trends') }}
        run: python scripts/web_refresh_notifications.py weekly-trend

      - name: Record stock-level operation logs
        continue-on-error: true
        run: python scripts/record_web_api_logs.py $REFRESH_TASKS

      - name: Report operational scale metrics
        continue-on-error: true
        run: python scripts/report_operational_scale.py

      - name: Commit refreshed caches
        run: |
          rm -f data/cache/stocks.before-refresh.json
          if git diff --quiet -- data/cache web/public/api; then
            echo "No cache changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cache web/public/api
          git commit -m "Update scheduled web data caches"
          git push origin "HEAD:${GITHUB_REF_NAME:-main}"

      - name: Deploy refreshed web
        if: ${{ env.VERCEL_TOKEN != '' }}
        working-directory: web
        run: npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Notify admins on failure
        if: failure()
        continue-on-error: true
        run: python scripts/web_refresh_notifications.py admin-failure --message "Web data refresh workflow failed. Check the latest GitHub Actions run."
